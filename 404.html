<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DickKicker">
  <title>DickKicker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <script src="lib/phaser.min.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="load-error" hidden></div>
  <div class="scanlines" aria-hidden="true"></div>
  <script type="module" src="src/main.js"></script>
  <script type="module">
    function showLoadError(message) {
      const box = document.getElementById('load-error');
      if (!box) return;
      box.hidden = false;
      box.textContent = 'Game failed to load: ' + message;
    }
    window.addEventListener('error', (event) => {
      showLoadError(event.message || 'unknown error');
    });
    window.addEventListener('unhandledrejection', (event) => {
      showLoadError(event.reason?.message || String(event.reason));
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
